syntax = "proto3";

package user;

option go_package = "github.com/nsalunke729/go-grpc-gateway/internal/pb/user;userpb";

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
}

message User {
  string id         = 1;
  string name       = 2;
  string email      = 3;
  int64  created_at = 4;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message CreateUserRequest {
  string name  = 1;
  string email = 2;
}

message CreateUserResponse {
  User user = 1;
}
